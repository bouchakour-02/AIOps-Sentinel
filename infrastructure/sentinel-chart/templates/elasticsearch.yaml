apiVersion: apps/v1
kind: Deployment
metadata:
  name: elasticsearch
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: elasticsearch
  template:
    metadata:
      labels:
        app: elasticsearch
    spec:
      containers:
      - name: elasticsearch
        image: docker.elastic.co/elasticsearch/elasticsearch:7.17.9
        env:
        - name: discovery.type
          value: single-node
        - name: xpack.security.enabled
          value: "false"
        # CRITICAL: This limits RAM usage to 512MB so your PC doesn't crash
        - name: ES_JAVA_OPTS
          value: "-Xms512m -Xmx512m"
        ports:
        - containerPort: 9200
         # --- AJOUT 1 : Lien interne au conteneur ---
        volumeMounts:
        - name: elastic-storage
          mountPath: /usr/share/elasticsearch/data
         # --- AJOUT 2 : Lien avec le disque dur d'Ubuntu ---
        volumes:
        - name: elastic-storage
          hostPath:
          path: /mnt/data/elasticsearch
          type: Directory
---
apiVersion: v1
kind: Service
metadata:
  name: elasticsearch
  namespace: default
spec:
  selector:
    app: elasticsearch
  ports:
  - port: 9200
    targetPort: 9200
    nodePort: 30200 # Fixed port to access from outside easily
  type: NodePort